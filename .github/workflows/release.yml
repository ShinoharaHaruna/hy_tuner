name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: hy_tuner
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: hy_tuner
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: hy_tuner.exe
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="hy_tuner-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/"
          tar -czf "${name}.tar.gz" -C dist "${{ matrix.bin }}"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "hy_tuner-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/" -Force
          Compress-Archive -Path "dist/${{ matrix.bin }}" -DestinationPath "${name}.zip" -Force

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hy_tuner-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
